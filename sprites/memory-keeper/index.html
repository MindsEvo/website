<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记忆守护者 Memory Keeper | MindsEvo</title>
  <style>
    :root {
      --blue: #2563eb;
      --green: #22c55e;
      --text: #0f172a;
      --muted: #64748b;
      --bg: #f6f9ff;
      --line: #e2e8f0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "SF Pro Display", "Helvetica Neue", Arial, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }
    a { color: inherit; text-decoration: none; }
    .nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px clamp(16px, 4vw, 56px);
      background: rgba(7, 18, 37, 0.92);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .brand { display: flex; align-items: center; gap: 10px; color: #fff; font-size: 20px; font-weight: 900; }
    .brand img { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.28); }
    .back-link {
      font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 8px 12px;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .lang-btn {
      font-size: 12px;
      font-weight: 800;
      color: #0f172a;
      background: #ffffff;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 999px;
      padding: 7px 11px;
      cursor: pointer;
    }
    .page { max-width: 980px; margin: 0 auto; padding: 36px clamp(16px, 4vw, 56px) 80px; }
    .panel { background: #fff; border: 1.5px solid var(--line); border-radius: 20px; padding: clamp(22px, 4vw, 36px); }
    .eyebrow { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--blue); margin-bottom: 14px; }
    h1 { font-size: clamp(30px, 4.6vw, 48px); font-weight: 900; line-height: 1.15; letter-spacing: -1px; margin-bottom: 12px; }
    p { max-width: 760px; color: var(--muted); font-size: clamp(15px, 1.8vw, 18px); }
    .status { margin-top: 18px; display: inline-block; border-radius: 10px; font-size: 13px; font-weight: 800; padding: 9px 12px; background: #e2e8f0; color: #64748b; }
    body[data-lang="zh"] .en { display: none; }
    body[data-lang="en"] .zh { display: none; }
  </style>
</head>
<body data-lang="zh">
  <nav class="nav">
    <a class="brand" href="../../index.html">
      <img src="../../logo.png" alt="MindsEvo" />
      <span><span class="zh">思进启智</span><span class="en">MindsEvo</span></span>
    </a>
    <div class="nav-actions">
      <button class="lang-btn" id="langBtn" type="button">中文 / EN</button>
      <a class="back-link" href="../index.html"><span class="zh">返回小精灵系列</span><span class="en">Back to Sprite Series</span></a>
    </div>
  </nav>

  <main class="page">
    <section class="panel">
      <div class="eyebrow"><span class="zh">小精灵系列</span><span class="en">Sprite Series</span></div>
      <h1><span class="zh">记忆守护者</span><span class="en">Memory Keeper</span></h1>
      <p><span class="zh">这是记忆守护者子系列预备页，后续将接入具体训练模块与难度分层。</span><span class="en">This is the preparatory page for Memory Keeper. Dedicated training modules and difficulty levels will be added later.</span></p>
      <div class="status"><span class="zh">即将上线</span><span class="en">Coming Soon</span></div>
    </section>
  </main>

  <script>
    (function () {
      const body = document.body;
      const langBtn = document.getElementById('langBtn');

      function applyLang(lang) {
        body.setAttribute('data-lang', lang === 'en' ? 'en' : 'zh');
        document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
        langBtn.textContent = lang === 'en' ? 'EN / 中文' : '中文 / EN';
        localStorage.setItem('mindsevo-lang', lang);
      }

      const saved = localStorage.getItem('mindsevo-lang');
      applyLang(saved === 'en' ? 'en' : 'zh');

      langBtn.addEventListener('click', function () {
        applyLang(body.getAttribute('data-lang') === 'zh' ? 'en' : 'zh');
      });
    })();
  </script>
</body>
</html>
