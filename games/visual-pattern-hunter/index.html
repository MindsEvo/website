<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>视觉规律 · Visual Pattern Hunter | MindsEvo</title>
  <style>
    :root {
      --primary:  #06b6d4;
      --primary2: #0891b2;
      --green:    #10b981;
      --yellow:   #f59e0b;
      --red:      #ef4444;
      --text:     #1e293b;
      --muted:    #64748b;
      --bg:       #f0f9ff;
      --card:     #ffffff;
      --border:   #e2e8f0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "SF Pro Display", "Helvetica Neue", Arial,
                   "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary2) 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* ── Card wrapper ─────────────────────────────────────────── */
    .game-container {
      background: var(--card);
      border-radius: 24px;
      padding: 36px 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.28);
      width: 100%;
      max-width: 680px;
    }

    .hidden { display: none !important; }

    /* ── Shared header row ────────────────────────────────────── */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .main-title   { font-size: 36px; color: var(--primary); font-weight: 900; }
    .main-subtitle { font-size: 15px; color: var(--muted); margin-bottom: 32px; }
    .header-controls { display: flex; gap: 8px; }

    .toggle-btn {
      background: white; border: 2px solid var(--border);
      border-radius: 20px; padding: 7px 14px;
      font-size: 14px; cursor: pointer; font-weight: 700;
      transition: all 0.2s;
    }
    .toggle-btn:hover  { border-color: var(--primary); }
    .toggle-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* ── Unit list (home) ─────────────────────────────────────── */
    .units-list { display: flex; flex-direction: column; gap: 16px; }

    .unit-card {
      border-radius: 14px; padding: 18px 22px;
      display: flex; align-items: center; gap: 18px;
      cursor: pointer; border: 2px solid var(--border);
      background: white;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .unit-card:not(.locked):hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    }
    .unit-card.locked { opacity: 0.48; cursor: not-allowed; background: #f8fafc; }

    .unit-card[data-unit="1"]:not(.locked) { border-color: #06b6d4; }
    .unit-card[data-unit="2"]:not(.locked) { border-color: #8b5cf6; }
    .unit-card[data-unit="3"]:not(.locked) { border-color: #3b82f6; }

    .unit-icon   { font-size: 40px; min-width: 50px; text-align: center; }
    .unit-info   { flex: 1; }
    .unit-name   { font-size: 20px; font-weight: 800; margin-bottom: 3px; color: var(--text); }
    .unit-desc   { font-size: 14px; color: var(--muted); }
    .unit-status { font-size: 13px; font-weight: 700; color: var(--muted); text-align: right; white-space: nowrap; }

    /* ── Game screen ──────────────────────────────────────────── */
    .game-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }
    .back-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px 8px; }
    .unit-title { font-size: 24px; font-weight: 800; color: var(--primary); }

    .game-info {
      display: flex; justify-content: space-between;
      font-size: 15px; color: var(--muted); font-weight: 600;
      margin-bottom: 14px;
    }
    .q-progress { color: var(--primary); font-weight: 800; }
    .live-score { color: var(--green);   font-weight: 800; }

    .progress-dots { display: flex; justify-content: center; gap: 7px; margin-bottom: 22px; }
    .progress-dot {
      width: 9px; height: 9px; border-radius: 50%; background: var(--border);
      transition: all 0.3s;
    }
    .progress-dot.active    { background: var(--primary); transform: scale(1.4); }
    .progress-dot.completed { background: var(--green); }

    /* Sequence display */
    .sequence-display {
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
      border-radius: 16px; padding: 32px 24px;
      font-size: 40px; font-weight: 900; letter-spacing: 5px;
      text-align: center; color: var(--text);
      margin-bottom: 24px; position: relative;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sequence-display .mystery {
      display: inline-block; background: var(--red); color: white;
      padding: 8px 20px; border-radius: 10px; font-size: 32px;
      vertical-align: middle;
    }
    .replay-btn {
      position: absolute; top: 10px; right: 12px;
      background: rgba(255,255,255,0.85); border: none; border-radius: 50%;
      width: 36px; height: 36px; font-size: 18px;
      cursor: pointer; transition: transform 0.2s;
    }
    .replay-btn:hover { transform: scale(1.12); }

    /* Options grid */
    .options-container {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px;
    }
    .option-btn {
      min-height: 80px; padding: 16px; font-size: 22px; font-weight: 800;
      border: 2.5px solid var(--border); border-radius: 14px;
      background: white; cursor: pointer; color: var(--text);
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .option-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      border-color: var(--primary);
    }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.6; }
    .option-btn.correct  { background: var(--green); color: white; border-color: var(--green); animation: correctPulse 0.45s ease; }
    .option-btn.wrong    { background: var(--red);   color: white; border-color: var(--red);   animation: shake 0.45s ease; }

    @keyframes correctPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

    /* Feedback */
    .feedback {
      min-height: 54px; font-size: 20px; font-weight: 800;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      justify-content: center; margin-bottom: 14px;
    }
    .feedback.correct { color: var(--green); }
    .feedback.wrong   { color: var(--red); }

    .hint-box {
      font-size: 16px; color: var(--text); font-weight: 600;
      background: #fef9c3; padding: 12px 20px;
      border-radius: 10px; border: 2px solid #fbbf24; 
      margin-bottom: 14px;
    }

    /* Action buttons */
    .action-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .btn {
      padding: 13px 34px; font-size: 18px; font-weight: 800;
      border: none; border-radius: 12px; cursor: pointer; transition: all 0.22s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: white; box-shadow: 0 4px 14px rgba(6,182,212,0.38);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(6,182,212,0.48); }
    .btn-secondary {
      background: var(--yellow); color: white; box-shadow: 0 4px 14px rgba(245,158,11,0.32);
    }
    .btn-secondary:hover { transform: translateY(-2px); }
    .btn-outline {
      background: white; color: var(--primary); border: 2.5px solid var(--primary);
    }
    .btn-outline:hover { background: #f0f9ff; transform: translateY(-2px); }

    /* ── Result screen ────────────────────────────────────────── */
    .result-screen { text-align: center; }
    .result-emoji  { font-size: 72px; margin-bottom: 16px; }
    .result-title  { font-size: 32px; font-weight: 900; color: var(--primary); margin-bottom: 24px; }
    .result-stats  {
      background: var(--bg); border-radius: 16px; padding: 24px;
      margin-bottom: 24px;
    }
    .result-score   { font-size: 48px; font-weight: 900; color: var(--green); margin-bottom: 12px; }
    .result-details { font-size: 16px; color: var(--muted); line-height: 1.9; }
    .result-message {
      font-size: 18px; color: var(--text); font-weight: 700;
      background: #fef9c3; border-radius: 12px; padding: 14px 20px;
      margin-bottom: 28px;
    }
    /* ── Practice Summary ───────────────────────────────── */
    .summary-wrap {
      margin-top: 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .summary-section {
      border-radius: 14px; border: 1.5px solid var(--border); overflow: hidden;
    }
    .summary-toggle {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 18px; cursor: pointer; background: var(--bg);
      font-size: 18px; font-weight: 700; color: var(--text);
      user-select: none; transition: background 0.2s;
    }
    .summary-toggle:hover { background: #e0f2fe; }
    .summary-arrow { font-size: 14px; color: var(--muted); }
    .summary-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s ease; background: white;
    }
    .summary-body.open { max-height: 700px; }

    /* Session table */
    .summary-table {
      width: 100%; border-collapse: collapse; font-size: 17px;
      margin: 0; color: var(--text);
    }
    .summary-table thead tr {
      background: var(--bg); border-bottom: 1.5px solid var(--border);
    }
    .summary-table th {
      padding: 10px 10px; font-weight: 700; font-size: 15px;
      color: var(--muted); text-align: center;
    }
    .summary-table th:first-child { text-align: left; padding-left: 16px; }
    .summary-table td {
      padding: 13px 10px; text-align: center;
      border-bottom: 1px solid #f1f5f9; font-weight: 600;
      color: var(--text);
    }
    .summary-table td.s-name { text-align: left; padding-left: 16px; font-weight: 700; }
    .summary-table td.s-correct { color: #16a34a; font-weight: 800; }
    .summary-table td.s-wrong   { color: var(--red); font-weight: 800; }
    .summary-table td.s-dash    { color: var(--muted); }
    .summary-table tr.s-idle td { color: var(--muted); }
    .summary-table tr:last-child td { border-bottom: none; }

    /* History stats */
    .summary-stats {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 8px; padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    .summary-stat { text-align: center; }
    .summary-stat-value {
      font-size: 28px; font-weight: 900; color: var(--text);
    }
    .summary-stat-label {
      font-size: 14px; color: var(--muted); margin-top: 5px; font-weight: 600;
    }
    .summary-clear {
      padding: 12px 16px;
    }
    .btn-clear {
      background: none; border: 1.5px solid #fca5a5; border-radius: 8px;
      color: var(--red); font-size: 15px; font-weight: 700;
      padding: 7px 16px; cursor: pointer; transition: all 0.2s;
    }
    .btn-clear:hover { background: #fef2f2; }
    .summary-empty {
      padding: 20px 16px; text-align: center;
      font-size: 15px; color: var(--muted);
    }
    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 820px) {
      body { align-items: flex-start; padding: 12px; }
      .game-container { max-width: 100%; border-radius: 18px; }
    }
    @media (max-width: 520px) {
      body { padding: 0; }
      .game-container { border-radius: 0; padding: 20px 16px 28px; min-height: 100svh; }
      .main-title     { font-size: 26px; }
      .sequence-display { font-size: 28px; letter-spacing: 2px; padding: 20px 12px; min-height: 100px; }
      .sequence-display .mystery { font-size: 28px; padding: 6px 16px; }
      .option-btn     { font-size: 17px; min-height: 70px; }
      .btn            { padding: 10px 18px; font-size: 15px; }
      .unit-name      { font-size: 17px; }
      .unit-icon      { font-size: 32px; min-width: 40px; }
      .unit-card      { padding: 14px 16px; gap: 12px; }
    }

    /* fade-in */
    .fade-in { animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div class="game-container">

  <!-- ════════ HOME SCREEN ════════ -->
  <div id="homeScreen" class="fade-in">
    <div class="app-header">
      <div id="appTitle" class="main-title">🎨 <span class="zh">视觉规律</span><span class="en">Visual Pattern Hunter</span></div>
      <div class="header-controls">
        <button class="toggle-btn voiceToggle" onclick="vphToggleVoice()" title="Toggle voice">🔊</button>
        <button class="toggle-btn" id="langToggle" onclick="vphToggleLang()">EN</button>
      </div>
    </div>
    <div id="appSubtitle" class="main-subtitle"><span class="zh">观察图形，发现规律</span><span class="en">Observe shapes and find patterns</span></div>
    <div class="units-list" id="unitsList"></div>

    <!-- Two collapsible summary sections -->
    <div class="summary-wrap">

      <!-- 本次练习 -->
      <div class="summary-section">
        <div class="summary-toggle" onclick="vphToggleSummary('session')">
          <span id="summaryTitleSession"><span class="zh">📝 本次练习</span><span class="en">📝 Current Session</span></span>
          <span class="summary-arrow" id="summaryArrowSession">▼</span>
        </div>
        <div class="summary-body" id="summaryBodySession"></div>
      </div>

      <!-- 历史总览 -->
      <div class="summary-section">
        <div class="summary-toggle" onclick="vphToggleSummary('history')">
          <span id="summaryTitleHistory"><span class="zh">📊 历史总览</span><span class="en">📊 All History</span></span>
          <span class="summary-arrow" id="summaryArrowHistory">▼</span>
        </div>
        <div class="summary-body" id="summaryBodyHistory"></div>
      </div>

    </div>
  </div>

  <!-- ════════ GAME SCREEN ════════ -->
  <div id="gameScreen" class="hidden fade-in">
    <div class="game-header">
      <button class="back-btn" onclick="vphBack()" title="Back">⬅️</button>
      <div id="unitTitle" class="unit-title"></div>
      <div class="header-controls">
        <button class="toggle-btn voiceToggle" onclick="vphToggleVoice()">🔊</button>
        <button class="toggle-btn" id="langToggleGame" onclick="vphToggleLang()">EN</button>
      </div>
    </div>

    <div class="game-info">
      <div class="q-progress"><span class="zh">第 <span id="currentQ">1</span> / <span id="totalQ">5</span> 题</span><span class="en">Q <span id="currentQEn">1</span> / <span id="totalQEn">5</span></span></div>
      <div class="live-score"><span class="zh">得分：<span id="liveScore">0</span></span><span class="en">Score: <span id="liveScoreEn">0</span></span></div>
    </div>

    <div class="progress-dots" id="progressDots"></div>

    <div class="sequence-display">
      <button class="replay-btn" onclick="vphReplayQuestion()" title="Replay">🔊</button>
      <div id="sequenceInner"></div>
    </div>

    <div class="options-container" id="optionsContainer"></div>

    <div class="feedback" id="feedback"></div>
    
    <div id="hintBox" class="hint-box hidden"></div>

    <div class="action-buttons" id="actionButtons"></div>
  </div>

  <!-- ════════ RESULT SCREEN ════════ -->
  <div id="resultScreen" class="hidden fade-in">
    <div class="result-emoji"  id="resultEmoji">🏆</div>
    <div class="result-title"  id="resultTitle">完成！</div>
    <div class="result-stats">
      <div class="result-score"   id="resultScore">4/5</div>
      <div class="result-details" id="resultDetails"></div>
    </div>
    <div class="result-message" id="resultMessage"></div>
    <div class="action-buttons" id="resultButtons"></div>
  </div>

</div>

<!-- ── Script load order matters ──────────────────────────── -->
<script src="../../shell.js"></script>
<script src="../../i18n/strings.js"></script>
<script src="./strings.js"></script>
<script src="./data.js"></script>
<script src="./game.js"></script>
</body>
</html>
