<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>创意工作坊 | MindsEvo</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #d9e3f1;
      --accent: #0ea5e9;
      --accent-2: #22c55e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Pro Display", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #dbeafe 0%, var(--bg) 58%);
      color: var(--ink);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 20px 42px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .back {
      color: #0369a1;
      font-weight: 700;
      text-decoration: none;
    }
    .lang-btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      color: #0f172a;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: -0.8px;
    }
    .lead {
      color: var(--muted);
      margin: 10px 0 28px;
      line-height: 1.7;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1.5px solid var(--line);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.07);
    }
    .tag {
      display: inline-block;
      font-size: 12px;
      color: #0369a1;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .name {
      font-size: 26px;
      font-weight: 900;
      margin: 0 0 8px;
    }
    .desc {
      color: var(--muted);
      line-height: 1.7;
      margin: 0 0 14px;
    }
    .go {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-radius: 10px;
      padding: 9px 14px;
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
    }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-lang="zh">
  <main class="wrap">
    <div class="top">
      <a class="back" href="../index.html" data-i18n="back" data-zh="← 返回主页" data-en="← Back Home">← 返回主页</a>
      <div class="top-actions">
        <button class="lang-btn" id="langBtn" type="button">中文 / EN</button>
      </div>
    </div>

    <h1 data-i18n="title" data-zh="创意工作坊 Creating Studio" data-en="Creating Studio">创意工作坊 Creating Studio</h1>
    <p class="lead" data-i18n="lead" data-zh="鼓励孩子从想法到作品，把创意变成可玩的思维练习。先从用户创意案例开始。" data-en="Encourage children to turn ideas into playable thinking exercises, starting from real creator cases.">鼓励孩子从想法到作品，把创意变成可玩的思维练习。先从用户创意案例开始。</p>

    <section class="grid">
      <article class="card">
        <div class="tag" data-i18n="tag-user" data-zh="用户设计" data-en="User Design">用户设计</div>
        <h2 class="name">Clio Design</h2>
        <p class="desc" data-i18n="clio-desc" data-zh="这是 Clio 的用户名字页面入口。点击进入后可查看该用户设计的游戏列表。" data-en="This is the entry page for Clio's creator profile. Enter to view the game list designed by this user.">这是 Clio 的用户名字页面入口。点击进入后可查看该用户设计的游戏列表。</p>
        <a class="go" href="./Clio/index.html" data-i18n="go-clio" data-zh="进入 Clio 页面" data-en="Enter Clio Page">进入 Clio 页面</a>
      </article>

      <article class="card">
        <div class="tag" data-i18n="tag-next" data-zh="即将上线" data-en="Coming Next">即将上线</div>
        <h2 class="name" data-i18n="more-name" data-zh="更多创意案例" data-en="More Creator Cases">更多创意案例</h2>
        <p class="desc" data-i18n="more-desc" data-zh="后续可扩展更多孩子或老师的创意案例，形成创意共创库。" data-en="More creator cases from children or teachers can be added later to build a co-creation library.">后续可扩展更多孩子或老师的创意案例，形成创意共创库。</p>
        <a class="go" href="./Clio/index.html" data-i18n="view-sample" data-zh="查看样例结构" data-en="View Sample Structure">查看样例结构</a>
      </article>
    </section>
  </main>

  <script>
    (function () {
      const body = document.body;
      const langBtn = document.getElementById('langBtn');
      const nodes = document.querySelectorAll('[data-i18n]');

      function applyLang(lang) {
        body.setAttribute('data-lang', lang);
        document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
        document.title = lang === 'en' ? 'Creating Studio | MindsEvo' : '创意工作坊 | MindsEvo';
        nodes.forEach((node) => {
          const text = node.getAttribute(lang === 'en' ? 'data-en' : 'data-zh');
          if (text != null) node.textContent = text;
        });
        langBtn.textContent = lang === 'en' ? 'EN / 中文' : '中文 / EN';
        localStorage.setItem('mindsevo-lang', lang);
      }

      const saved = localStorage.getItem('mindsevo-lang');
      applyLang(saved === 'en' ? 'en' : 'zh');
      langBtn.addEventListener('click', () => {
        applyLang(body.getAttribute('data-lang') === 'zh' ? 'en' : 'zh');
      });
    })();
  </script>
</body>
</html>
