<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clio Sorting Workshop MVP</title>
  <link rel="stylesheet" href="./style.css?v=967eb77" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="topbar-head">
        <div>
          <h1 id="titleText">Sorting Workshop</h1>
          <p class="subtitle" id="subtitleText">Clio MVP · classify falling colors into baskets</p>
        </div>
        <div class="topbar-tools" aria-label="Game controls">
          <button id="langBtn" class="mini-btn" type="button">中文 / EN</button>
          <button id="musicBtn" class="mini-btn" type="button">Music: On</button>
          <button id="sfxBtn" class="mini-btn" type="button">SFX: On</button>
        </div>
      </div>
      <div class="hud">
        <div class="chip"><span id="correctLabel">Correct</span>: <span id="correctCount">0</span></div>
        <div class="chip"><span id="wrongLabel">Wrong</span>: <span id="wrongCount">0</span></div>
        <div class="chip"><span id="missLabel">Miss</span>: <span id="missCount">0</span></div>
      </div>
    </header>

    <section class="playfield-wrap">
      <aside class="speed-panel" aria-label="Speed control">
        <div class="speed-title" id="speedTitle">Speed</div>
        <div class="speed-track">
          <div class="speed-marks" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <input id="speedBar" class="speed-bar" type="range" min="60" max="220" step="10" value="92" />
        </div>
        <div class="speed-value"><span id="speedValue">92</span> <span id="speedUnit">px/s</span></div>
      </aside>

      <div id="playfield" class="playfield" aria-label="Falling items area"></div>

      <div id="baskets" class="baskets" aria-label="Color baskets">
        <div class="basket" data-color="purple">
          <div class="basket-grid"></div>
          <div class="basket-label">Purple</div>
        </div>
        <div class="basket" data-color="orange">
          <div class="basket-grid"></div>
          <div class="basket-label">Orange</div>
        </div>
        <div class="basket" data-color="green">
          <div class="basket-grid"></div>
          <div class="basket-label">Green</div>
        </div>
      </div>
    </section>

    <section class="controls">
      <button id="startBtn" class="btn">Start</button>
      <button id="pauseBtn" class="btn ghost">Pause</button>
      <button id="resetBtn" class="btn ghost">Reset</button>
      <button id="dumpBtn" class="btn ghost">Dump Session JSON</button>
    </section>

    <section class="log">
      <div class="log-title" id="logTitle">Latest Feedback</div>
      <div id="feedbackText">Press Start</div>
    </section>
  </main>

  <script src="./game.js?v=967eb77"></script>
</body>
</html>
