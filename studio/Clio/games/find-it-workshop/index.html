<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find It | Clio</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="topbar-head">
        <div>
          <h1 id="titleText">寻找游戏 Find It</h1>
          <p class="subtitle" id="subtitleText">点击画面中的目标物品，全部找齐即可完成。</p>
        </div>
        <div class="topbar-tools">
          <button id="langBtn" class="mini-btn" type="button">中文 / EN</button>
          <button id="speakBtn" class="mini-btn" type="button">朗读目标</button>
          <button id="musicBtn" class="mini-btn" type="button">音乐: 开</button>
          <button id="sfxBtn" class="mini-btn" type="button">音效: 开</button>
        </div>
      </div>
      <div class="hud">
        <div class="chip"><span id="foundLabel">目标状态</span>: <span id="progressText">进行中</span></div>
        <div class="chip"><span id="mistakeLabel">误点</span>: <span id="mistakeCount">0</span></div>
        <div class="chip"><span id="doneLabel">完成次数</span>: <span id="doneCount">0</span></div>
      </div>
    </header>

    <section class="target-panel">
      <div class="target-title" id="targetTitle">目标清单</div>
      <div class="targets" id="targets"></div>
      <div class="feedback" id="feedback">点击任意目标开始寻找。</div>
    </section>

    <section class="board-wrap" id="boardWrap">
      <div class="board" id="board" aria-label="Find It board"></div>
      <div class="done-layer" id="doneLayer" aria-hidden="true">
        <div class="done-card">
          <div class="done-title" id="doneTitle">全部找到啦！</div>
          <button id="againBtn" class="play-again" type="button">再来一局</button>
        </div>
      </div>
    </section>

    <section class="controls">
      <button id="resetBtn" class="btn ghost" type="button">重置本局</button>
      <button id="dumpBtn" class="btn ghost" type="button">导出简要状态</button>
    </section>
  </main>

  <script src="../../../../shell.js"></script>
  <script src="../_shared/clio-runtime-bridge.js"></script>
  <script src="./data.js"></script>
  <script src="./game.js"></script>
</body>
</html>
