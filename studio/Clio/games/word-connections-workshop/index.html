<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Match | Clio</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1 id="titleText">连线组词 Word Match</h1>
        <p class="subtitle" id="subtitleText">连接左右完全相同的词，并排除只看位置的干扰策略。</p>
      </div>
      <div class="controls">
        <button id="langBtn" class="mini" type="button">中文 / EN</button>
        <label for="levelSelect" id="levelLabel">难度</label>
        <select id="levelSelect">
          <option value="L1">L1</option>
          <option value="L2" selected>L2</option>
        </select>
        <button id="musicBtn" class="mini" type="button">Music: On</button>
        <button id="sfxBtn" class="mini" type="button">SFX: On</button>
        <button id="undoBtn" class="btn" type="button">撤销一步</button>
        <button id="resetBtn" class="btn" type="button">重置</button>
        <button id="dumpBtn" class="btn primary" type="button">导出会话 JSON</button>
      </div>
    </header>

    <section class="board-wrap">
      <div class="hud">
        <div class="chip"><span id="correctLabel">正确</span>: <span id="correctCount">0</span></div>
        <div class="chip"><span id="wrongLabel">错误</span>: <span id="wrongCount">0</span></div>
        <div class="chip"><span id="dupLabel">干扰命中</span>: <span id="dupCount">0</span></div>
        <div class="chip"><span id="foundLabel">已完成配对</span>: <span id="foundCount">0</span>/<span id="targetCount">0</span></div>
      </div>
      <div id="feedback"></div>

      <div class="board" id="board">
        <div class="col">
          <h2 class="col-title" id="leftTitle">左列词</h2>
          <div class="word-list" id="leftList"></div>
        </div>

        <svg class="link-canvas" id="linkCanvas"></svg>

        <div class="col">
          <h2 class="col-title" id="rightTitle">右列词</h2>
          <div class="word-list" id="rightList"></div>
        </div>
      </div>

      <div class="legend">
        <span><i class="dot antonym"></i><span id="legendAntonym">相同词正确连线</span></span>
        <span><i class="dot co"></i><span id="legendCo">重复词用于位置干扰</span></span>
        <span id="lineHint">提示：先点任意一侧的词，再点另一侧完全相同的词；点击已画连线可撤销</span>
      </div>

      <div class="log" id="eventLog"></div>
    </section>
  </main>

  <script src="../../../../shell.js"></script>
  <script src="../_shared/clio-runtime-bridge.js"></script>
  <script src="./data.js"></script>
  <script src="./game.js"></script>
</body>
</html>
